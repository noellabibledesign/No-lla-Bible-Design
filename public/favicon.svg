<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background & Internal Bubble 3D shading -->
    <radialGradient id="bubbleInterior" cx="50%" cy="50%" r="50%" fx="35%" fy="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#fdfaffe" stop-opacity="0.12"/>
      <stop offset="85%" stop-color="#f5f0ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e8e2fa" stop-opacity="0.4"/>
    </radialGradient>

    <!-- Iridescent Outer Soap Bubble Spectrum Gradient -->
    <linearGradient id="iridescentGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb8f5" stop-opacity="0.95"/>
      <stop offset="20%" stop-color="#9bf8ff" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#fffaa3" stop-opacity="0.75"/>
      <stop offset="65%" stop-color="#acff9e" stop-opacity="0.8"/>
      <stop offset="85%" stop-color="#9ca9ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#e9a6ff" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Upper Specular Curved Reflection -->
    <radialGradient id="glassReflectionTop" cx="50%" cy="25%" r="45%" fx="50%" fy="10%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.33"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Lower Secondary Reflection (rebound light) -->
    <radialGradient id="glassReflectionBottom" cx="50%" cy="85%" r="30%" fx="50%" fy="95%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outside Iridescent Outline Rim Ring -->
  <circle cx="256" cy="256" r="246" fill="none" stroke="url(#iridescentGlow)" stroke-width="12" opacity="0.95"/>

  <!-- Inside Bubble Shading and Ambient refraction -->
  <circle cx="256" cy="256" r="242" fill="url(#bubbleInterior)"/>
  <circle cx="256" cy="256" r="242" fill="url(#iridescentGlow)" opacity="0.14" style="mix-blend-mode: overlay;"/>

  <!-- Iconic Circular Shadow Accent -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="#685c72" stroke-width="1.5" opacity="0.15"/>

  <!-- Styled Bold Centered "NB" Branding Initials -->
  <text x="256" y="294" 
        font-family="'Montserrat', 'Inter', -apple-system, sans-serif" 
        font-weight="800" 
        font-size="208" 
        fill="#5a5654" 
        text-anchor="middle"
        letter-spacing="-0.04em">NB</text>

  <!-- Curve Accent Highlights and Specular Soap Glare Crescent near top -->
  <path d="M 65,175 A 205,205 0 0,1 447,175 A 215,182 0 0,0 65,175 Z" fill="url(#glassReflectionTop)" opacity="0.75" />

  <!-- Soft reflection gloss on the bottom-right/bottom edge -->
  <ellipse cx="256" cy="442" rx="145" ry="32" fill="url(#glassReflectionBottom)" opacity="0.6"/>

  <!-- Fine Outside Highlight Rim -->
  <circle cx="256" cy="256" r="244" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
</svg>
